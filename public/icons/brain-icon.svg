<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MVOG Lab orbital brain logo">
  <defs>
    <radialGradient id="bg" cx="48%" cy="43%" r="80%">
      <stop offset="0" stop-color="#17372e"/>
      <stop offset="0.42" stop-color="#152a2c"/>
      <stop offset="0.78" stop-color="#13191a"/>
      <stop offset="1" stop-color="#0a0d0c"/>
    </radialGradient>
    <radialGradient id="aura" cx="44%" cy="42%" r="52%">
      <stop offset="0" stop-color="#39f29f" stop-opacity="0.54"/>
      <stop offset="0.34" stop-color="#35d2d9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#35d2d9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow"/>
    </filter>
  </defs>

